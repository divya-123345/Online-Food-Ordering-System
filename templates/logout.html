<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TastyHub — Logout</title>

<style>
:root{--accent:#ff4d79;--bg:#f7f7fc;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:var(--bg);}

/* HEADER */
.header{
    display:flex;align-items:center;gap:14px;
    padding:14px 22px;background:#fff;
    border-bottom:3px solid rgba(255,77,77,0.13);
}
.header img{width:55px;height:55px;border-radius:10px;margin-left:250px;}
.header-title{
    font-size:50px;font-weight:900;color:var(--accent);
    margin-left:18px;font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif
}

/* NAVBAR */
.navbar{height:60px;background:#111;position:relative;}
.navbar a{
    position:absolute;left:20px;top:50%;
    transform:translateY(-50%);
    font-size:26px;color:white;text-decoration:none;
}

/* CONTAINER */
.container{
    width:420px;margin:80px auto;background:white;
    padding:30px;border-radius:16px;
    box-shadow:0 8px 18px rgba(0,0,0,0.12);
    text-align:center;
}
h2{color:rgba(18, 18, 18, 0.884);margin-bottom:20px;font-size:32px;font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif}
p{font-size:18px;margin-bottom:30px;font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}

button{
    width:100%;padding:14px;background:var(--accent);
    border:none;border-radius:10px;color:white;
    font-size:20px;font-weight:bold;cursor:pointer;font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif
}
button:hover{opacity:0.9;}

/* POPUP */
.popup{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;justify-content:center;align-items:center;
}
.popup-box{
    background:white;padding:25px;width:350px;
    border-radius:14px;text-align:center;
}
.popup-box h3,p{color:var(--accent);margin-bottom:10px;font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif}
.popup-box button{margin-top:15px;}
.show{display:flex;}
</style>
</head>

<body>

<header class="header">
    <img src="/static/Images/Logo.webp">
    <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<nav class="navbar">
    <a href="/owner_dashboard">&#9776;</a>
</nav>

<div class="container">
    <h2>Logout</h2>
    <p>Are you sure you want to logout?</p>
    <button onclick="openPopup()">Confirm Logout</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Successfully Logged Out ✔</h3>
        <p>You have been logged out...!</p>

        <form action="/logout_confirm" method="POST">
            <button type="submit">OK</button>
        </form>
    </div>
</div>

<script>
function openPopup(){
    document.getElementById("popup").classList.add("show");
}
</script>

</body>
</html>
