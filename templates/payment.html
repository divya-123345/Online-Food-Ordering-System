<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TastyHub – Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{--accent:#ff4d79;--bg:#f7f7fc}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:var(--bg)}

.header{
  background:#fff;padding:15px;display:flex;align-items:center;
  border-bottom:3px solid rgba(255,77,77,.15)
}
.header img{width:55px;border-radius:12px;margin-left:200px;margin-right:15px}
.header-title{font-size:50px;font-weight:900;color:var(--accent)}

.navbar{background:#111;padding:12px 20px}
.navbar a{color:#fff;text-decoration:none;font-weight:600;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}

.payment-box{
  max-width:650px;margin:35px auto;background:#fff;
  padding:25px;border-radius:15px;
  box-shadow:0 6px 18px rgba(0,0,0,.12)
}

h2{color:var(--accent);text-align:center;margin-bottom:25px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}

.summary{
  background:#f7f7fc;padding:15px;border-radius:10px;margin-bottom:20px
}
.summary p,b{margin-bottom:6px;font-weight:600;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}

.methods label{
  display:block;margin:12px 0;font-weight:600;cursor:pointer
}

.method-box{display:none;margin-top:10px}
.method-box input{
  width:100%;padding:10px;margin:8px 0;
  border:1px solid #ccc;border-radius:8px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

.pay-btn{
  width:100%;padding:14px;background:#2ecc71;color:#fff;
  font-size:22px;font-weight:700;border:none;border-radius:25px;
  cursor:pointer;margin-top:20px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
.pay-btn:hover{background:#056e31}

.processing{
  display:none;text-align:center;
  font-size:20px;font-weight:700;color:#ff4d79;margin-top:20px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
.processing i{font-size:35px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<header class="header">
  <img src="/static/Images/Logo.webp">
  <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<nav class="navbar">
  <a href="javascript:history.back()">←</a>
</nav>

<div class="payment-box">

<h2>Payment</h2>

<div class="summary">
  <p>👤 <b>Name:</b> {{ order.customer_name }}</p>
  <p>📍 <b>Address:</b> {{ order.address }}</p>
  <p>💰 <b>Total:</b> ₹{{ order.total_amount }}</p>
</div>

<div class="methods">

<label style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">
  <input type="radio" name="paymethod" value="upi"
         onclick="showMethod('upi')">
  Pay Now (UPI)
</label>

<div id="upi" class="method-box">
  <input type="text" id="upi_id" placeholder="example@upi">
</div>

<label style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">
  <input type="radio" name="paymethod" value="later"
         onclick="payLater()">
  Pay Later
</label>



<div id="later" class="method-box">
  <p style="color:#777;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">You can pay later from Pending Payments</p>
</div>

</div>

<button class="pay-btn" onclick="processPayment()">
  Continue
</button>

<div class="processing" id="processing">
  <i class="fa fa-spinner"></i>
  <p>Processing Payment Please Wait...</p>
</div>

</div>
<script>
function showMethod(method){
  document.getElementById("upi").style.display="none";
  document.getElementById("later").style.display="none";
  document.getElementById(method).style.display="block";
}

function processPayment(){
  let method = document.querySelector('input[name="paymethod"]:checked');
  if(!method){
    alert("Select payment option");
    return;
  }

  // PAY LATER
  if(method.value === "later"){
    fetch("/payment/later",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ order_id: {{ order.order_id }} })
    })
    .then(()=> window.location.href="/customer_home");
    return;
  }

  // PAY NOW
  let upi = document.getElementById("upi_id").value.trim();
  if(upi==="" || !upi.includes("@")){
    alert("Invalid UPI ID");
    return;
  }

  document.querySelector(".pay-btn").style.display="none";
  document.getElementById("processing").style.display="block";

  fetch("/confirm_payment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      order_id: {{ order.order_id }},
      upi_id: upi
    })
  })
  .then(res=>res.json())
  .then(()=> window.location.href="/payment_success/{{ order.order_id }}");
}
</script>

</body>
</html>
