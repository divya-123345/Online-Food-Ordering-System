<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TastyHub – Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --accent:#ff4d79;
  --dark:#111;
  --bg:#f7f7fc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:var(--bg);
}

/* ---------- Header ---------- */
.header{
  background:#fff;
  padding:15px;
  display:flex;
  align-items:center;
  border-bottom:3px solid rgba(255,77,77,.15)
}
.header img{
  width:55px;
  border-radius:12px;
  margin-right:20px;
  margin-left:250px;
}
.header-title{
  font-size:50px;
  font-weight:900;
  color:var(--accent);
  font-family:Cambria, Georgia, serif;
}

/* ---------- Navbar ---------- */
.navbar{
  background:var(--dark);
  padding:12px 20px;
  display:flex;
  align-items:center;
}
.navbar a{
  color:#fff;
  font-size:22px;
  margin-right:20px;
  text-decoration:none;
}
.navbar a:hover{
  color:var(--accent);
}

/* ---------- Contact Container ---------- */
.contact-container{
  width:95%;
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:35px;
  border-radius:15px;
  box-shadow:0 12px 30px rgba(0,0,0,.1)
}

.contact-container h2{
  text-align:center;
  color:var(--accent);
  font-size:32px;
  margin-bottom:30px;
  font-family:Cambria, Georgia, serif;
}

/* ---------- Contact Info ---------- */
.contact-info{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:35px;
}

.info-box{
  background:#f9f9ff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
.info-box i{
  font-size:30px;
  color:var(--accent);
  margin-bottom:10px;
}
.info-box h4{
  font-size:20px;
  margin-bottom:8px;
  font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
.info-box p{
  font-weight:600;
  color:#010101;
  font-family: Georgia, 'Times New Roman', Times, serif;

}

/* ---------- Contact Form ---------- */
form{
  display:grid;
  gap:15px;
}

input, textarea{
  padding:14px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  font-weight: bold;
  color: #111;
  font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

textarea{
  resize:none;
  height:70px;
}

button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:15px;
  font-size:25px;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
button:hover{
  background:#e63c65;
}
</style>
</head>

<body>

<!-- Header -->
<header class="header">
  <img src="/static/Images/Logo.webp">
  <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<!-- Navbar -->
<nav class="navbar">
  <a href="/customer_home"><i class="fa fa-arrow-left"></i></a>
  <!-- <a href="#"><i class="fa fa-bars"></i></a> -->
</nav>

<!-- Contact Section -->
<section class="contact-container">
  <h2>Contact Us</h2>

  <!-- Contact Info -->
  <div class="contact-info">

    <div class="info-box">
      <i class="fa fa-phone"></i>
      <h4>Phone</h4>
      <p>+91 98765 43210</p>
    </div>

    <div class="info-box">
      <i class="fa fa-envelope"></i>
      <h4>Email</h4>
      <p>support@tastyhub.com</p>
    </div>

    <div class="info-box">
      <i class="fa fa-location-dot"></i>
      <h4>Address</h4>
      <p>Pune, Maharashtra – 411001</p>
    </div>

  </div>

<form id="contactForm" method="post" action="/contact_us">
  <input type="text" name="name" placeholder="Your Full Name" required>
  <input type="tel" name="mobile" placeholder="Mobile Number" required>
  <textarea name="message" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message</button>
</form>


</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("/contact_us", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if(data.status === "success"){
            alert(data.message);
            window.location.href = "/customer_home";
        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        console.error(err);
        alert("Error submitting message!");
    });
});

</script>

</body>
</html>
