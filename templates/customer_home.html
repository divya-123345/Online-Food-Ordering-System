<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TastyHub – Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{--accent:#ff4d79;--dark:#111;--bg:#f7f7fc}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:var(--bg)}

.header{
  background:#fff;padding:15px;display:flex;
  justify-content:center;align-items:center;
  border-bottom:3px solid rgba(255,77,77,.15)
}
.header img{width:55px;border-radius:12px}
.header-title{font-size:40px;font-weight:900;color:var(--accent);margin-left:15px}

.navbar{
  background:#111;
  padding:20px 70px;
  display:flex;justify-content:space-between;align-items:center
}
.nav-links a{
  color:#fff;
  margin-right:45px;
  text-decoration:none;
  font-size:28px;
  font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
  font-weight:600
}
.nav-links a:hover{color:var(--accent)}

.cart-box{
  color:#fff;font-size:26px;position:relative;cursor:pointer
}
.cart-count{
  position:absolute;top:-6px;right:-10px;
  background:var(--accent);width:22px;height:22px;
  border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-size:14px;font-weight:700
}

#menu{width:95%;max-width:1400px;margin:20px auto}

.filter-buttons button{
  padding:10px 22px;border:none;border-radius:15px;
  background-color: #100f0fdf;
  color: #f5f0f0;
  margin-right:20px;font-weight:600;cursor:pointer;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

}
.filter-buttons .active{background:var(--accent);color:#f5f0f0}

.menu{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:25px;margin-top:25px
}
.menu-card{
  background:#fff;border-radius:15px;
  box-shadow:0 5px 18px rgba(0,0,0,.1);
  overflow:hidden
}
.menu-card img{width:100%;height:250px;object-fit:cover}

.menu-info{padding:15px}
.menu-info h4{font-size:20px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}
/* .menu-info p{font-size:20px;font-weight:700;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;} */

.menu-info button{
  width:100%;margin-top:12px;
  padding:14px;border:none;border-radius:25px;
  background:#ff4d4d;color:#fff;
  font-size:17px;font-weight:700;cursor:pointer;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
.menu-info button.added{
  background:#2ecc71;cursor:default
}

.toast{
  position:absolute;top:15px;right:15px;
  background:#000;color:#fff;
  padding:8px 14px;border-radius:20px;
  font-size:14px;display:none
}
</style>
</head>

<body>

<header class="header">
  <img src="/static/Images/Logo.webp">
  <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<nav class="navbar">
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/track_order">Track Order</a>
    <a href="/pending_payment">Pending Payment</a>
     <a href="/about_us">About Us</a>
    <a href="/contact_us">Contact Us</a>
   <a href="/logout">Logout</a>
  </div>

  <div class="cart-box" onclick="location.href='/cart'">
    <i class="fa fa-shopping-cart"></i>
    <div class="cart-count" id="cartCount">0</div>
  </div>
</nav>

<section id="menu">
  <div class="filter-buttons">
    <button class="active" onclick="filterMenu('all',this)">All</button>
    <button onclick="filterMenu('Veg',this)">Veg</button>
    <button onclick="filterMenu('Non-Veg',this)">Non-Veg</button>
  </div>

  <div class="menu" id="menuContainer"></div>
</section>

<script>
let fullMenu = [];
let cart = []; // Backend cart

/* ---------- LOAD MENU ---------- */
async function loadMenu(){
  // Get full menu
  const res = await fetch("/get_food");
  fullMenu = await res.json();

  // Get cart from backend
  const cartRes = await fetch("/get_cart");
  cart = await cartRes.json();

  renderMenu("all");
  updateCartCount();
}

/* ---------- RENDER MENU ---------- */
function renderMenu(cat){
  const box = document.getElementById("menuContainer");
  box.innerHTML="";

  fullMenu.forEach(item=>{
    if(cat !== "all" && item.category !== cat) return;

    const exists = cart.find(c=>c.menu_id === item.id);

    box.innerHTML += `
    <div class="menu-card">
      <div style="position:relative">
        <img src="${item.image}">
        <div class="toast">Added to cart</div>
      </div>
      <div class="menu-info">
        <h4>   ${item.name} - ₹${item.price}</h4>
        <button class="${exists?'added':''}" ${exists?'disabled':''}
          onclick="addToCart(${item.id},this)">
          ${exists?'Added':'Add To Cart'}
        </button>
      </div>
    </div>`;
  });
}

/* ---------- ADD TO CART ---------- */
async function addToCart(menu_id, btn){
  // Call backend
  const res = await fetch("/add_to_cart", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({menu_id: menu_id, quantity:1})
  });
  const data = await res.json();

  if(data.status === "success"){
    // Update local cart
    const food = fullMenu.find(f=>f.id===menu_id);
    cart.push({
      cart_id: null,
      menu_id: food.id,
      name: food.name,
      price: food.price,
      quantity: 1,
      image: food.image
    });

    btn.innerText = "Added";
    btn.classList.add("added");
    btn.disabled = true;

    const toast = btn.closest(".menu-card").querySelector(".toast");
    toast.style.display = "block";
    setTimeout(()=>toast.style.display="none",1200);

    updateCartCount();
  }
}

/* ---------- CART COUNT ---------- */
function updateCartCount(){
  const total = cart.reduce((sum, item)=>sum + item.quantity, 0);
  document.getElementById("cartCount").innerText = total;
}

/* ---------- FILTER ---------- */
function filterMenu(cat, btn){
  document.querySelectorAll(".filter-buttons button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderMenu(cat);
}

/* ---------- INIT ---------- */
loadMenu();
</script>

</body>
</html>
