<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TastyHub — Forgot Password</title>

<style>
:root{
    --accent:#ff4d79;
    --bg:#f7f7fc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background:var(--bg);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 22px;
    background:#fff;
    border-bottom:3px solid rgba(255,77,77,0.13);
}
.header img{
    width:55px;
    height:55px;
    border-radius:10px;
    margin-left:250px;
}
.header-title{
    font-size:42px;
    font-weight:900;
    color:var(--accent);
    margin-left:18px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

/* NAVBAR */
.navbar{
    height:60px;
    background:#111;
    position:relative;
}
.navbar a{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:26px;
    color:white;
    text-decoration:none;
}

/* FORM CONTAINER */
.container{
    width:430px;
    margin:45px auto;
    background:white;
    padding:28px;
    border-radius:14px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:var(--accent);
    margin-bottom:25px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

/* INPUTS */
label{
    font-weight:bold;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:18px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    background:var(--accent);
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
button:hover{
    opacity:0.9;
}

.back-btn{
    background:#555;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <img src="/static/Images/Logo.webp" alt="logo">
    <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/login">&#9776;</a>
</nav>

<!-- FORGOT PASSWORD FORM -->
<div class="container">
    <h2>Forgot Password</h2>

    <form action="/forgot_password" method="POST" onsubmit="return validateForm()">

        <label>Email</label>
        <input type="email" id="email" name="email" placeholder="Enter registered email">

        <label>New Password</label>
        <input type="password" id="password" name="password" placeholder="Enter new password">

        <label>Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Confirm password">

        <button type="submit">Reset Password</button>
        <!-- <button type="button" class="back-btn" onclick="location.href='/login'">Back to Login</button> -->

    </form>
</div>

<script>
function validateForm(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if(email === "" || password === "" || confirm === ""){
        alert("All fields are required!");
        return false;
    }
    if(password !== confirm){
        alert("Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
