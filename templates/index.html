<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TastyHub Menu Manager</title>

<style>
:root{
    --accent:#ff4d79;
    --dark:#111;
    --bg:#f7f7fc;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:var(--bg);}

/* HEADER */
.header{
    display:flex;align-items:center;
    padding:14px 22px;background:#fff;
    border-bottom:3px solid rgba(255,0,0,.15);
}
.header img{width:55px;height:55px;border-radius:10px;margin-left:260px;}
.header-title{font-size:50px;font-weight:900;color:var(--accent);margin-left:20px;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;}

/* NAVBAR */
.navbar{
    background:var(--dark);
    padding:16px 0;
    display:flex;
    justify-content:center;
    gap:40px;
}
.navbar a{
    color:#fff;
    font-size:25px;
    text-decoration:none;
    padding:8px 20px;
    border-radius:8px;
    font-weight:600;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}
.navbar a:hover{
    background:rgba(255,77,77,.2);
    color:var(--accent);
}

/* SECTION */
.section{
    display:none;
    margin:25px auto;
    background:#fff;
    padding:20px;
    width:90%;
    max-width:1200px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    color:var(--accent);
    margin-bottom:15px;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}

/* FILTER */
.filter{
    margin-bottom:20px;
}
.filter label{
    margin-right:20px;
    /* font-size:18px; */
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}

/* MENU GRID */
.menu{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.menu-card{
  background:#fff;
  border-radius:15px;
  box-shadow:0 5px 18px rgba(0,0,0,.1);
  overflow:hidden;
}

.menu-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.menu-info{
  padding:15px;
  text-align:center;
}

.menu-info h4{
  font-size:22px;
  margin-bottom:6px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}

.menu-info p{
  font-size:20px;
  font-weight:700;
  color:#ff4d4d;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}

/* FORM */
input,select,textarea,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    font-size: 20px;
}

button{
    background:var(--accent);
    color:#fff;
    font-weight:700;
    border:none;
    font-size:22px;
    cursor:pointer;
    font-size: 20px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}
button:hover{opacity:.9}
</style>
</head>

<body>

<header class="header">
    <img src="/static/Images/Logo.webp">
    <div class="header-title">TASTYHUB FOOD RESTAURANT</div>
</header>

<nav class="navbar">
    <a href="/owner_dashboard" style="margin-right:0px;">⬅</a>
    <a onclick="showSection('viewMenu')">View Menu</a>
    <a onclick="showSection('addMenu')">Add Menu</a>
    <a onclick="showSection('updateMenu')">Update Price</a>
    <a onclick="showSection('deleteMenu')">Delete Menu</a>
</nav>

<!-- VIEW MENU -->
<div class="section" id="viewMenu">
<h2>View Menu</h2>

<div class="filter">
<label><input type="radio" name="filter" value="all" checked onchange="loadMenu()"> All</label>
<label><input type="radio" name="filter" value="Veg" onchange="loadMenu()"> Veg</label>
<label><input type="radio" name="filter" value="Non-Veg" onchange="loadMenu()"> Non-Veg</label>
</div>

<div class="menu" id="menuContainer"></div>
</div>

<!-- ADD MENU -->
<div class="section" id="addMenu">
<h2>Add Food</h2>
<input id="addName" value="" placeholder="Food Name">
<input id="addPrice" value="" type="number" placeholder="Price">
<select id="addCategory">
<option>Veg</option>
<option>Non-Veg</option>
</select>
<!-- <textarea id="addDesc" placeholder="Description"></textarea> -->
<input type="file" id="addImg">
<button onclick="addFood()">Add Food</button>
</div>

<!-- UPDATE MENU -->
<div class="section" id="updateMenu">
<h2>Update Price</h2>
<select id="upFood" onchange="fillUpdate()"></select>
<input id="upCategory" readonly placeholder="Category">
<input id="upOldPrice" readonly placeholder="Old Price">
<input id="upNewPrice" type="number" placeholder="New Price">
<button onclick="updateFood()">Update</button>
</div>

<!-- DELETE MENU -->
<div class="section" id="deleteMenu">
<h2>Delete Food</h2>
<select id="delFood" onchange="fillDelete()"></select>
<input id="delCategory" readonly placeholder="Category">
<button onclick="deleteFood()">Delete</button>
</div>

<script>
let foodData = [];

function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="block";
    if(id !== "addMenu") loadFoodDropdowns();
    if(id === "viewMenu") loadMenu();
}

/* LOAD MENU (DESIGN ONLY) */
async function loadMenu(){
    const res = await fetch("/get_food");
    const menu = await res.json();

    const filter = document.querySelector("input[name='filter']:checked").value;
    const box = document.getElementById("menuContainer");
    box.innerHTML = "";

    menu.forEach(item=>{
        if(filter !== "all" && item.category !== filter) return;

        box.innerHTML += `
        <div class="menu-card">
            <img src="${item.image}">
            <div class="menu-info">
                <h4>${item.name} - ₹${item.price}</h4>
            </div>
        </div>`;
    });
}

/* DROPDOWNS */
function loadFoodDropdowns(){
fetch("/get_food").then(r=>r.json()).then(data=>{
foodData=data;
upFood.innerHTML='<option value="">Select Food</option>';
delFood.innerHTML='<option value="">Select Food</option>';
data.forEach(i=>{
upFood.innerHTML+=`<option>${i.name}</option>`;
delFood.innerHTML+=`<option>${i.name}</option>`;
});
});
}

function fillUpdate(){
let f=foodData.find(x=>x.name===upFood.value);
if(!f) return;
upCategory.value=f.category;
upOldPrice.value=f.price;
}

function fillDelete(){
let f=foodData.find(x=>x.name===delFood.value);
if(!f) return;
delCategory.value=f.category;
}

/* CRUD */
function addFood(){
let fd=new FormData();
fd.append("name",addName.value);
fd.append("price",addPrice.value);
fd.append("category",addCategory.value);
// fd.append("desc",addDesc.value);
fd.append("image",addImg.files[0]);
fetch("/add_food",{method:"POST",body:fd})
.then(r=>r.json()).then(d=>alert(d.message));
}

function updateFood(){
let fd=new FormData();
fd.append("name",upFood.value);
fd.append("price",upNewPrice.value);
fetch("/update_food",{method:"POST",body:fd})
.then(r=>r.json()).then(d=>alert(d.message));
}

function deleteFood(){
let fd=new FormData();
fd.append("name",delFood.value);
fetch("/delete_food",{method:"POST",body:fd})
.then(r=>r.json()).then(d=>alert(d.message));
}

showSection("viewMenu");
</script>

</body>
</html>
